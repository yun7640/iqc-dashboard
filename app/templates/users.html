{% extends "base.html" %}
{% block title %}사용자 관리{% endblock %}
{% block content %}
<h4 class="section-title">사용자 계정 관리</h4>

<div class="card mb-3"><div class="card-header">사용자 목록</div><div class="card-body table-responsive">
  <table class="table table-sm align-middle">
    <thead><tr><th>아이디</th><th>성명</th><th>직함</th><th>역할</th><th>상태</th><th>정보 수정</th><th>비밀번호 재설정</th><th>삭제</th></tr></thead>
    <tbody>
    {% for u in users %}
    <tr>
      <td>{{ u.username }}</td>
      <form method="post" action="{{ url_for('admin.user_edit', uid=u.id) }}">
      <td><input name="name" class="form-control form-control-sm" value="{{ u.name }}" style="width:110px"></td>
      <td><input name="title" class="form-control form-control-sm" value="{{ u.title or '' }}" style="width:140px"></td>
      <td>
        <select name="role" class="form-select form-select-sm" style="width:130px">
          <option value="qc_manager" {{ 'selected' if u.role=='qc_manager' }}>정도관리담당</option>
          <option value="pathologist" {{ 'selected' if u.role=='pathologist' }}>전문의</option>
          <option value="admin" {{ 'selected' if u.role=='admin' }}>관리자</option>
        </select>
      </td>
      <td><div class="form-check"><input class="form-check-input" type="checkbox" name="active" {{ 'checked' if u.active }}> 활성</div></td>
      <td><button class="btn btn-sm btn-outline-primary">저장</button></td>
      </form>
      <td>
        <form method="post" action="{{ url_for('admin.user_password', uid=u.id) }}" class="d-flex gap-1">
          <input name="password" class="form-control form-control-sm" placeholder="새 비밀번호" style="width:130px">
          <button class="btn btn-sm btn-outline-secondary">재설정</button>
        </form>
      </td>
      <td>
        {% if u.id != current_user.id %}
        <form method="post" action="{{ url_for('admin.user_delete', uid=u.id) }}"
              onsubmit="return confirm('사용자 \'{{ u.name }}\' 계정을 삭제할까요? (전자서명 기록이 있으면 삭제되지 않고 비활성화를 권고합니다)');">
          <button class="btn btn-sm btn-outline-danger">삭제</button>
        </form>
        {% else %}<span class="small text-muted">본인</span>{% endif %}
      </td>
    </tr>
    {% endfor %}
    </tbody>
  </table>
</div></div>

<div class="card"><div class="card-header">사용자 추가</div><div class="card-body">
  <form method="post" action="{{ url_for('admin.user_new') }}" class="row g-2 align-items-end">
    <div class="col-md-2"><label class="form-label">아이디</label><input name="username" class="form-control" required></div>
    <div class="col-md-2"><label class="form-label">성명</label><input name="name" class="form-control" required></div>
    <div class="col-md-3"><label class="form-label">직함</label><input name="title" class="form-control" placeholder="임상병리사 / 진단검사의학과 전문의"></div>
    <div class="col-md-2"><label class="form-label">역할</label>
      <select name="role" class="form-select">
        <option value="qc_manager">정도관리담당</option>
        <option value="pathologist">전문의</option>
        <option value="admin">관리자</option>
      </select></div>
    <div class="col-md-2"><label class="form-label">초기 비밀번호</label><input name="password" class="form-control" placeholder="changeme123"></div>
    <div class="col-md-1"><button class="btn btn-primary w-100">추가</button></div>
  </form>
</div></div>
{% endblock %}
